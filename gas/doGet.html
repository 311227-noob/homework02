<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GAS Web App 測試頁面</title>
  <style>body{font-family:system-ui,Arial;margin:16px;padding:0}input{padding:8px;margin-right:8px}button{padding:8px}</style>
</head>
<body>
  <h1>GAS Web App — 測試頁面</h1>
  <p>此頁面可用來測試你的 Web App 是否可被存取，並直接向同一 URL 發送測試 POST（查詢城市天氣）。</p>

  <div>
    <input id="city" placeholder="輸入城市 (例如 Taipei)" />
    <button id="btn">發送測試查詢</button>
  </div>

  <h3>回傳結果</h3>
  <pre id="out" style="background:#f6f8fa;padding:12px;border-radius:6px;min-height:120px"></pre>

  <script>
    document.getElementById('btn').addEventListener('click', async () => {
      const city = document.getElementById('city').value.trim();
      if (!city) return alert('請輸入城市');
      const url = window.location.href;
      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({city})
        });
        const json = await res.json();
        document.getElementById('out').textContent = JSON.stringify(json, null, 2);
      } catch (err) {
        document.getElementById('out').textContent = String(err);
      }
    });
  </script>
</body>
</html>
