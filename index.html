      <!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>天氣查詢系統</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>天氣查詢</h1>
    <div class="controls">
      <input id="cityInput" placeholder="輸入城市 (例如: Taipei, London)" />
      <button id="searchBtn">查詢</button>
    </div>

    <div id="result" class="card hidden">
      <h2 id="cityName"></h2>
      <div class="row">
        <img id="icon" alt="icon" />
        <div>
          <p id="description"></p>
          <p><strong>溫度:</strong> <span id="temp"></span> °C</p>
          <p><strong>濕度:</strong> <span id="humidity"></span> %</p>
          <p><strong>風速:</strong> <span id="wind"></span> m/s</p>
        </div>
      </div>
    </div>

    <p class="note">設定 API 金鑰與 GAS 網址請編輯 <strong>script.js</strong>。</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
